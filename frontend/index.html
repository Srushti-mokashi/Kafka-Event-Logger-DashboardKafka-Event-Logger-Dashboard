<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kafka Event Logger Dashboard</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<header>
<h1>Kafka Event Logger Dashboard</h1>
<p>
<span class="status-indicator status-online"></span>
Real-time Event Streaming System
</p>
</header>


<!-- METRICS -->
<div class="metrics">

<div class="metric-card">
<h3>Total Events</h3>
<p id="totalEvents">0</p>
</div>

<div class="metric-card">
<h3>User Signups</h3>
<p id="signupCount">0</p>
</div>

<div class="metric-card">
<h3>Orders</h3>
<p id="orderCount">0</p>
</div>

<div class="metric-card">
<h3>Payments</h3>
<p id="paymentCount">0</p>
</div>

</div>


<!-- DASHBOARD GRID -->
<div class="dashboard-grid">

<!-- PRODUCE EVENT -->

<section class="card form-card">

<h2>Produce Event</h2>

<form id="eventForm">

<div class="form-group">
<label>Event Type</label>

<select id="event_type" required>

<option disabled selected>Select event</option>

<option value="user_signup">User Signup</option>
<option value="order_placed">Order Placed</option>
<option value="item_added_to_cart">Item Added</option>
<option value="payment_success">Payment Success</option>
<option value="user_login">User Login</option>

</select>
</div>

<div class="form-group">
<label>User ID</label>
<input id="user_id" placeholder="USER_12345" required>
</div>

<button id="submitBtn">Produce Event</button>

</form>

</section>


<!-- CHARTS -->

<section class="card charts">

<h2>Event Analytics</h2>

<div class="charts-grid">

<div class="chart-box">
<canvas id="eventTypeChart"></canvas>
</div>

<div class="chart-box">
<canvas id="eventTimelineChart"></canvas>
</div>

</div>

</section>

</div>


<!-- EVENTS TABLE FULL WIDTH -->

<section class="card table-card">

<h2>Recent Events</h2>

<div class="table-container">

<table>

<thead>

<tr>
<th>ID</th>
<th>Event Type</th>
<th>User</th>
<th>Timestamp</th>
</tr>

</thead>

<tbody id="eventsTable">

<tr>
<td colspan="4" class="loading">
Fetching events...
</td>
</tr>

</tbody>

</table>

</div>

</section>

</div>

<script src="script.js"></script>

</body>
</html>
